<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Quiz Result</h1>

    <h2 id="username"></h2>

    <p><strong>Your Score:</strong> <span id="score"></span></p>

    <p><strong>Percentage:</strong> <span id="percentage"></span>%</p>

    <h3 id="status"></h3>

    <button class="btn" onclick="restartQuiz()">Restart Quiz</button>

</div>

<script>
const username = localStorage.getItem("username") || "Guest";
const score = parseInt(localStorage.getItem("score")) || 0;
const totalQuestions = 10;
const percentage = (score / totalQuestions) * 100;

document.getElementById("username").innerText = "Name: " + username;
document.getElementById("score").innerText = score + " / " + totalQuestions;
document.getElementById("percentage").innerText = percentage.toFixed(0);

if (percentage >= 50) {
    document.getElementById("status").innerHTML =
        "🎉 Congratulations! You Passed.";
} else {
    document.getElementById("status").innerHTML =
        "❌ Better Luck Next Time.";
}

function restartQuiz() {
    localStorage.removeItem("score");
    window.location.href = "index.html";
}
</script>

</body>
</html>
